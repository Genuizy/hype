<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Hype't</title><link rel="stylesheet" href="style.css"></head><body>
<div id="lock"><div class="box"><h1>Hype't</h1><input id="pw" type="password" placeholder="Access code"><button onclick="login()">Unlock</button><p id="err"></p></div></div>
<header><div class="logo">Hype't</div><div class="topdrop"><button onclick="toggleTop()">Menu ▾</button><div id="topMenu" class="drop"><a href="#" onclick="showSection('home')">Home</a><a href="#" onclick="showSection('settings')">Settings</a></div></div></header>
<div class="wrap"><aside><button onclick="toggleSide()">Navigation ▾</button><div id="sideMenu" class="drop open">
<button onclick="showSection('home')">Dashboard</button><button onclick="showSection('goals')">Goals</button><button onclick="showSection('progress')">Progress</button><button onclick="showSection('motivation')">Motivation</button><button onclick="showSection('achievements')">Achievements</button><button onclick="showSection('settings')">Settings</button></div></aside>
<main>
<section id="home" class="sec active"><h2>Dashboard</h2><p>Welcome to Hype't.</p></section>
<section id="goals" class="sec"><h2>Goals</h2><input id="goalInput"><button onclick="addGoal()">Add</button><ul id="goalList"></ul></section>
<section id="progress" class="sec"><h2>Progress</h2><progress max="100" value="82"></progress></section>
<section id="motivation" class="sec"><h2>Motivation</h2><blockquote>Small progress is still progress.</blockquote></section>
<section id="achievements" class="sec"><h2>Achievements</h2><p>🏆 First Login</p></section>
<section id="settings" class="sec"><h2>Settings</h2><p>More settings coming soon.</p></section>
</main></div><script src="script.js"></script></body></html>
