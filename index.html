<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><link rel='stylesheet' href='style.css'><title>Hype't</title></head><body>
<div id='lock'><div class='login'><h1>Hype't</h1><input id='pw' type='password' placeholder='Password'><button onclick='login()'>Unlock</button><p id='msg'></p></div></div>
<header><div class='logo'>Hype't</div><div class='menu'><button onclick='toggleTop()'>☰ Menu</button><div id='top' class='drop'><a href='#' onclick="show('home')">Home</a><a href='#' onclick="show('settings')">Settings</a></div></div></header>
<div class='container'><aside><button onclick='toggleSide()'>Navigation ▼</button><div id='side' class='drop open'>
<button onclick="show('home')">Dashboard</button><button onclick="show('goals')">Goals</button><button onclick="show('progress')">Progress</button><button onclick="show('motivation')">Motivation</button><button onclick="show('achievements')">Achievements</button><button onclick="show('settings')">Settings</button></div></aside>
<main>
<section id='home' class='page active'><div class='cards'><div class='card'>🔥 Streak</div><div class='card'>🎯 Goal</div><div class='card'>📈 Progress</div></div><div class='chat'>AI Chat Coming Soon</div></section>
<section id='goals' class='page'><h2>Goals</h2><input id='goal'><button onclick='addGoal()'>Add</button><ul id='list'></ul></section>
<section id='progress' class='page'><h2>Progress</h2><progress max='100' value='82'></progress></section>
<section id='motivation' class='page'><h2>Motivation</h2><p>You are capable of more than you think.</p></section>
<section id='achievements' class='page'><h2>Achievements</h2><p>🏆 First Login</p></section>
<section id='settings' class='page'><h2>Settings</h2></section>
</main></div><script src='script.js'></script></body></html>
