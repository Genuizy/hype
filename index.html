<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hype't</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<!-- PASSWORD SCREEN -->

<div id="lockScreen">

<div class="loginBox">

<h1>Hype't</h1>

<p>Please enter the early access code you have been provided by Hype' t</p>

<input
type="password"
id="password"
placeholder="Access Code"
autocomplete="off"
>

<button onclick="login()">
Unlock
</button>

<p id="error"></p>

</div>

</div>

<header>

<div class="logo">
Hype't
</div>

<nav>

<a href="#">Home</a>

<a href="#">Progress</a>

<a href="#">Goals</a>

<a href="#">Community</a>

<a href="#">Settings</a>

</nav>

</header>

<div class="container">

<div class="sidebar">

<h2>Menu</h2>

<button>🏠 Dashboard</button>

<button>💬 AI Chat</button>

<button>🎯 Goals</button>

<button>📈 Progress</button>

<button>🔥 Motivation</button>

<button>🏆 Achievements</button>

<button>⚙ Settings</button>

</div>

<main>

<h1>Welcome Back 👋</h1>

<p>Your AI Motivator will be here soon.</p>

<div class="cards">

    <div class="card">
        <h2>🔥 Streak</h2>
        <p>7 Days</p>
    </div>

    <div class="card">
        <h2>🎯 Goal</h2>
        <p>Finish Today's Work</p>
    </div>

    <div class="card">
        <h2>📈 Progress</h2>
        <p>82%</p>
    </div>

</div>

<!-- Goals Section -->

<div class="goals">

    <h2>🎯 Goal List</h2>

    <div class="goalInput">

        <input
        type="text"
        id="goalInput"
        placeholder="Add a new goal..."
        >

        <button onclick="addGoal()">
            Add Goal
        </button>

    </div>

    <ul id="goalList"></ul>

</div>

<!-- Chat -->

<div class="chat">

<h2>AI Chat</h2>

<div class="chatbox">

AI Coming Soon...

</div>

<div class="inputArea">

<input
type="text"
placeholder="Talk to Hype't..."
>

<button>
Send
</button>

</div>

</div>

</main>

</div>

<script src="script.js"></script>

</body>
</html>
